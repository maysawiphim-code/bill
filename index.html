<!DOCTYPE html>
<html>

<head>
    <title>Receipt OCR Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .upload-box {
            max-width: 600px;
            margin: 50px auto;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container upload-box">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h3>Receipt OCR Scanner</h3>
                <p class="mb-0">รองรับ 7-11, Big C, CJ Express</p>
            </div>
            <div class="card-body p-4">
                <form action="/" method="post" enctype="multipart/form-data">
                    <p class="text-muted">เลือกรูปภาพใบเสร็จ (สามารถอัปโหลดได้หลายไฟล์พร้อมกัน):</p>
                    {% for i in range(1, 7) %}
                    <div class="mb-3">
                        <label class="form-label">ใบเสร็จที่ {{ i }}</label>
                        <input type="file" name="file{{ i }}" class="form-control" accept="image/*">
                    </div>
                    {% endfor %}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">เริ่มประมวลผล OCR</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center text-muted">
                <small>Powered by EasyOCR & Tesseract</small>
            </div>
        </div>
    </div>
</body>

</html>
